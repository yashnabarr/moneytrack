<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PockIt — Personal Finance</title>
  <meta name="description" content="PockIt — a polished personal-finance tracker. Track income & expenses, set budgets, hit savings goals, and explore beautiful analytics. Light & dark themes." />
  <meta name="theme-color" content="#0b1326" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f4fbf4" media="(prefers-color-scheme: light)" />

  <!-- Favicon / app icon: the PockIt mark as an inline SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' rx='11' fill='%2310b981'/><path d='M12 24v2a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-2' stroke='white' stroke-opacity='.65' stroke-width='2.6' stroke-linecap='round' fill='none'/><path d='M20 26V12M14.4 18 20 12l5.6 6' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/></svg>" />

  <!-- Apply the saved theme BEFORE first paint to avoid any flash of the wrong theme. -->
  <script>
    (function () {
      try {
        var p = JSON.parse(localStorage.getItem('mt_prefs') || '{}');
        var t = p.theme || 'light';
        var dark = t === 'dark' || (t === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('theme-dark', dark);
      } catch (e) {}
    })();
  </script>

  <!-- ===== Fonts & icons (CDN — no JS, no eval) ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />

  <!-- ===== Stylesheets (load order matters: tokens first, responsive last) ===== -->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/landing.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/analytics.css" />
  <link rel="stylesheet" href="css/settings.css" />
  <link rel="stylesheet" href="css/recurring.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <!-- Render target. The active screen (landing / auth / app) is injected here by js/app.js. -->
  <div id="root"></div>

  <!--
    ===== Script load order =====
    Plain <script> tags so the file works from file:// (no module/eval needed).
    Each file appends to the global scope; later files reference earlier ones.
  -->

  <!--
    ===== API configuration =====
    Change this one URL before deploying to production.
    Local dev  → http://localhost:3001
    Production → https://your-backend.vercel.app
  -->
  <script>
    window.API_BASE_URL = 'https://moneytrack-phi.vercel.app';
  </script>

  <!-- 1. Constants (pure data) -->
  <script src="data/constants.js"></script>

  <!-- 2. Core services -->
  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/state.js"></script>
  <script src="js/helpers.js"></script>

  <!-- 3. Feature modules -->
  <script src="js/docs.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/currency-selector.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/landing.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/transactions.js"></script>
  <script src="js/budgets.js"></script>
  <script src="js/goals.js"></script>
  <script src="js/recurring.js"></script>
  <script src="js/analytics.js"></script>

  <!-- 4. Orchestrator (renders + boots the app) -->
  <script src="js/app.js"></script>
</body>
</html>
